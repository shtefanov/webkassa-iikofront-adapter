name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - beta

permissions:
  contents: read

jobs:
  contract-tests:
    name: Node contract tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run contract tests
        run: npm test
